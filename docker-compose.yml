version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ndtv_dam_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ndtv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ndtvpass}
      POSTGRES_DB: ${POSTGRES_DB:-ndtv_dam}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ndtv} -d ${POSTGRES_DB:-ndtv_dam}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ndtv_dam_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ndtv_dam_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: ndtv_dam_backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - upload_data:/data/uploads
      - ./assets:/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: ndtv_dam_celery
    command: celery -A app.worker worker --loglevel=info -Q ingest,face,embedding,variant,quality -c 4
    env_file: .env
    volumes:
      - ./backend:/app
      - upload_data:/data/uploads
      - ./assets:/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: ndtv_dam_celery_beat
    command: celery -A app.worker beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    restart: unless-stopped

  flower:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: ndtv_dam_flower
    command: celery -A app.worker flower --port=5555
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: ndtv_dam_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  upload_data:
